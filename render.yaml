services:
  - type: web
    name: aura-search-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000

  - type: web
    name: aura-search-frontend
    env: static
    region: oregon
    plan: free
    staticPublishDir: frontend
